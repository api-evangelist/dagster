apis:
  - aid: dagster:graphql-api
    name: Dagster GraphQL API
    description: >-
      The Dagster GraphQL API allows clients to interact with Dagster
      programmatically. It can be used to query information about Dagster runs,
      retrieve metadata about repositories, jobs, and ops, and launch runs.
      The GraphQL endpoint is served by the webserver at the /graphql route.
    humanURL: https://docs.dagster.io/api/graphql
    tags:
      - GraphQL
      - Data Orchestration
      - Workflows
      - Jobs
      - Runs
    properties:
      - type: Documentation
        url: https://docs.dagster.io/api/graphql
      - type: GraphQL Playground
        url: https://docs.dagster.io/api/graphql
  - aid: dagster:external-assets-rest-api
    name: Dagster External Assets REST API
    description: >-
      The Dagster External Assets REST API provides endpoints to report asset
      materializations, asset check evaluations, and asset observations for
      external assets back to Dagster. This allows you to notify Dagster that
      an external asset has been updated and include metadata about the event.
    humanURL: https://docs.dagster.io/api/rest-apis/external-assets-rest-api
    tags:
      - REST API
      - Assets
      - Materializations
      - Observations
      - Data Orchestration
    properties:
      - type: Documentation
        url: https://docs.dagster.io/api/rest-apis/external-assets-rest-api
