name: Dagster External Assets REST API Capabilities
description: >-
  Capabilities exposed by the Dagster External Assets REST API for reporting
  events about externally-materialized data assets back into Dagster.
capabilities:
  - name: Report Asset Materialization
    description: >-
      Notify Dagster that an external asset has been re-materialized, with
      optional metadata, partition, data version, and description.
    operationId: reportAssetMaterialization
    method: POST
    path: /report_asset_materialization/
  - name: Report Asset Check Evaluation
    description: >-
      Record the pass/fail result of an asset check, including severity for
      failed evaluations and optional metadata.
    operationId: reportAssetCheck
    method: POST
    path: /report_asset_check/
  - name: Report Asset Observation
    description: >-
      Record an observation about an asset without claiming a new
      materialization, including data version, partition, and metadata.
    operationId: reportAssetObservation
    method: POST
    path: /report_asset_observation/
use_cases:
  - name: External pipeline integration
    description: >-
      Notify Dagster of materializations from pipelines that run outside of
      Dagster (Airflow, dbt Cloud, Spark) so they appear in the asset graph.
  - name: Data quality reporting
    description: >-
      Report quality and freshness check results from external systems back
      into Dagster's asset checks UI and run history.
  - name: Cross-team observability
    description: >-
      Surface upstream data events from other teams as observations so
      downstream Dagster assets can react to them.
