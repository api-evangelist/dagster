naftiko: 1.0.0-alpha2
info:
  label: Dagster External Assets REST API — Materializations
  description: 'Dagster External Assets REST API — Materializations. 1 operations. Lead operation: Report asset materialization.
    Self-contained Naftiko capability covering one Dagster business surface.'
  tags:
  - Dagster
  - Materializations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DAGSTER_API_KEY: DAGSTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: external-assets-rest-materializations
    baseUri: http://localhost:3000
    description: Dagster External Assets REST API — Materializations business capability. Self-contained, no shared references.
    resources:
    - name: report_asset_materialization
      path: /report_asset_materialization/
      operations:
      - name: reportassetmaterialization
        method: POST
        description: Report asset materialization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Dagster-Cloud-Api-Token
      value: '{{env.DAGSTER_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: external-assets-rest-materializations-rest
    port: 8080
    description: REST adapter for Dagster External Assets REST API — Materializations. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/report-asset-materialization
      name: report-asset-materialization
      description: REST surface for report_asset_materialization.
      operations:
      - method: POST
        name: reportassetmaterialization
        description: Report asset materialization
        call: external-assets-rest-materializations.reportassetmaterialization
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: external-assets-rest-materializations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dagster External Assets REST API — Materializations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: report-asset-materialization
      description: Report asset materialization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: external-assets-rest-materializations.reportassetmaterialization
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
